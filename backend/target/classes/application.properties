# PROVIDED – fully configured, app starts on Day 1 with no changes needed.
spring.application.name=smartbudget

# H2 In-Memory DB (dev)
spring.datasource.url=jdbc:h2:mem:smartbudget;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console → http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Seed data runs AFTER Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
server.port=8080
