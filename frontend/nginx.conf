# ============================================================
# TICKET-F109 (Day 10, Sprint 9) — nginx Configuration for React SPA
# ============================================================
#
# WHAT: nginx (pronounced "engine-X") is a high-performance web server.
#       This configuration file tells nginx how to handle incoming HTTP requests.
#       It does THREE things:
#         1. Serves React's static files (HTML, JS, CSS, images)
#         2. Proxies /api/* requests to the Spring Boot backend container
#         3. Handles React Router URLs with try_files (SPA fallback)
#
# WHY:  Without this config, two things break:
#
#       PROBLEM 1 — API calls fail:
#         React runs on nginx (port 80). Backend runs on port 8080.
#         The browser sends API calls to port 80 (where nginx is).
#         Without proxy, nginx says "I don't know /api/categories" → 404.
#         WITH proxy, nginx forwards /api/* to the backend → success.
#
#       PROBLEM 2 — Page refresh gives 404:
#         React Router creates URLs like /transactions, /savings, /add.
#         These are NOT real files on the server — they only exist in React's JavaScript.
#         When you refresh on /transactions, nginx looks for a FILE called "transactions" → 404.
#         WITH try_files, nginx says "file not found? serve index.html instead"
#         → React loads → React Router reads the URL → shows the right page.
#
# VISUAL: How requests flow through nginx:
#
#       Browser request                    nginx decision
#       ──────────────                     ──────────────
#       GET /                          →   Serve index.html  (React app)
#       GET /transactions              →   No file found → try_files → index.html
#       GET /assets/index-abc.js       →   Serve the JS file directly
#       GET /api/categories            →   Proxy to http://backend:8080/api/categories
#       GET /api/transactions/user/1   →   Proxy to http://backend:8080/api/transactions/user/1
#
# ============================================================


# -------------------------------------------------------
# TODO TICKET-F109: Write the server block (~15 lines)
# -------------------------------------------------------
#
# WHAT: A "server" block is nginx's main configuration unit.
#       It defines: which port to listen on + how to handle different URL paths.
#       Inside, you use "location" blocks to match URL patterns.
#
# HOW — Write this structure (pay attention to the curly braces and indentation):
#
# SKELETON — Fill in the blanks below:
#
#   server {
#       listen _____;                     ← Step 1: Which port?
#
#       location /api/ {                  ← Step 2: API proxy
#           proxy_pass ________________;  ← Where to forward?
#           proxy_set_header Host $host;
#           proxy_set_header X-Real-IP $remote_addr;
#       }
#
#       location / {                      ← Step 3: React SPA
#           root ______________________;  ← Where are the files?
#           index index.html;
#           try_files $uri $uri/ /index.html;
#       }
#   }
#
#
# STEP-BY-STEP GUIDE:
#
# ── Step 1: listen directive ──────────────────────────────
#
#     listen 80;
#
#     WHAT: Tells nginx to listen for HTTP requests on port 80.
#           Port 80 is the standard HTTP port (browsers use it by default).
#           When you visit http://localhost:3000, Docker maps port 3000 → 80.
#
#     WHY:  nginx needs to know which port to bind to.
#           Port 80 is conventional for web servers.
#
#
# ── Step 2: location /api/ { ... } — API proxy ───────────
#
#     location /api/ {
#         proxy_pass http://backend:8080;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#     }
#
#     WHAT: Any URL starting with /api/ gets forwarded to the backend container.
#           "proxy_pass" tells nginx: "Don't handle this yourself — send it to backend:8080"
#
#     BREAKDOWN:
#       location /api/ { ... }
#         → "For any URL that starts with /api/ ..."
#
#       proxy_pass http://backend:8080;
#         → "Forward the request to http://backend:8080"
#         → "backend" is the SERVICE NAME from docker-compose.yml
#         → Docker's internal DNS resolves "backend" to the container's IP address
#         → This ONLY works inside Docker's network (not from your laptop)
#
#       proxy_set_header Host $host;
#         → Preserves the original Host header (e.g., "localhost:3000")
#         → Without this, the backend sees "backend:8080" as the host, which can break some features
#
#       proxy_set_header X-Real-IP $remote_addr;
#         → Passes the client's real IP address to the backend
#         → Without this, the backend sees nginx's IP, not the user's IP
#
#     IMPORTANT: The trailing slash in "/api/" matters!
#       location /api/   → matches /api/categories, /api/transactions/user/1
#       location /api    → might also match /apikeys, /apiary (unintended!)
#
#     WHY:  Without this proxy, the browser would need to call http://localhost:8080/api/...
#           directly. That creates CORS issues (browser blocks requests to different ports).
#           The proxy makes the browser think frontend and backend are the same server.
#
#
# ── Step 3: location / { ... } — React SPA ───────────────
#
#     location / {
#         root /usr/share/nginx/html;
#         index index.html;
#         try_files $uri $uri/ /index.html;
#     }
#
#     WHAT: Serves static files and handles React Router's client-side routing.
#
#     BREAKDOWN:
#       location / { ... }
#         → "For any URL that doesn't match /api/ ..."
#         → This is the catch-all — handles /, /transactions, /assets/xxx.js, etc.
#
#       root /usr/share/nginx/html;
#         → "Look for files in this directory"
#         → This is where the Dockerfile copied the built React files
#         → So "/" maps to /usr/share/nginx/html/index.html
#         → And "/assets/index.js" maps to /usr/share/nginx/html/assets/index.js
#
#       index index.html;
#         → "If someone requests '/', serve index.html by default"
#
#       try_files $uri $uri/ /index.html;
#         → THE MOST IMPORTANT LINE FOR REACT APPS
#         → This is a fallback chain. nginx tries each option in order:
#
#         Example: User visits /transactions
#           Try 1: $uri        → Look for a file named "transactions"         → NOT FOUND
#           Try 2: $uri/       → Look for a directory named "transactions/"   → NOT FOUND
#           Try 3: /index.html → Serve index.html                            → FOUND!
#                  React loads → reads URL "/transactions" → shows TransactionList component
#
#         Example: User requests /assets/index-abc.js
#           Try 1: $uri        → Look for file "assets/index-abc.js"          → FOUND!
#                  nginx serves the JavaScript file directly. Done.
#
#     WHY:  Without try_files, refreshing the browser on /transactions returns 404
#           because there's no file at that path — React Router handles that URL
#           entirely in JavaScript, and index.html is the entry point.
#
#
# OBSERVE — Test each behavior after docker-compose up:
#
#   TEST 1 — Static file serving:
#     Visit http://localhost:3000
#     → nginx serves index.html → React app loads → you see the Dashboard
#
#   TEST 2 — React Router (try_files):
#     Navigate to http://localhost:3000/transactions using the navbar
#     → Works! React Router handles it client-side.
#     Now REFRESH the page (F5 or Ctrl+R)
#     → Still works! try_files serves index.html → React Router loads → shows Transactions page.
#     → WITHOUT try_files, this refresh would show an nginx 404 error page.
#
#   TEST 3 — API proxy:
#     Visit http://localhost:3000/api/categories in your browser
#     → nginx proxies to backend:8080 → Spring Boot returns JSON
#     → You should see category data (Salary, Groceries, etc.)
#
#   TEST 4 — Open browser DevTools (F12) → Network tab:
#     → API calls go to port 3000 (nginx), not 8080 (backend)
#     → nginx transparently proxies them — the browser never talks to port 8080
#
#
# COMMON MISTAKES:
#   WRONG: Missing semicolons at the end of directives → nginx refuses to start
#   WRONG: Using "localhost" in proxy_pass → fails inside Docker (use service name "backend")
#   WRONG: Missing trailing slash in "location /api/" → matches unintended paths
#   WRONG: Forgetting try_files → page refresh on /transactions gives nginx 404
#   WRONG: Wrong root path → blank page (check: does /usr/share/nginx/html/index.html exist?)
#
# TROUBLESHOOTING:
#   If nginx won't start, check for syntax errors:
#     docker run --rm -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf nginx:alpine nginx -t
#     This runs "nginx -t" (test config) without starting the server.
#     It will tell you exactly which line has the error.
